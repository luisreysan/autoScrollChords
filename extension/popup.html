<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoScrollChords Exporter</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 12px; width: 320px; background: #fff; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      p { margin: 0 0 8px; font-size: 12px; color: #444; }
      button { width: 100%; min-height: 42px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: default; }
      #status { margin-top: 10px; font-size: 12px; white-space: pre-wrap; }
      .row { margin-top: 10px; display: flex; gap: 8px; }
      .link { color: #2563eb; text-decoration: none; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Export current UG song</h1>
    <p>Open a Ultimate Guitar tab page, then export to your app.</p>
    <button id="exportBtn">Export current song</button>
    <div id="status"></div>
    <div class="row">
      <a class="link" href="options.html" target="_blank" rel="noopener noreferrer">Extension settings</a>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
